<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Galería</title>

<link rel="icon" type="image/png" href="img/logo.png">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
font-family:"Segoe UI", Arial, sans-serif;
background:#f4f6f8;
color:#222;
overflow-x:hidden;
}

/* ================= HEADER (IGUAL AL INDEX) ================= */
header{
position:fixed;
top:0;
left:0;
right:0;
background:#000;
z-index:1000;
box-shadow:0 5px 25px rgba(0,0,0,.6);
}

.header-inner{
max-width:1200px;
margin:auto;
padding:10px 20px;
display:flex;
align-items:center;
justify-content:space-between;
}

.brand img{
height:80px;
}

nav{
display:flex;
gap:18px;
}

nav a{
color:white;
text-decoration:none;
font-weight:700;
}

nav a:hover{
color:#d4af37;
}

/* ================= GALERÍA ================= */
main{margin-top:110px}

.gallery-section{
max-width:1200px;
margin:0 auto;
padding:50px 20px;
text-align:center;
}

h2{
color:#d4af37;
margin-bottom:30px;
font-size:32px;
text-transform:uppercase;
}

/* CAROUSEL */
.carousel{
position:relative;
overflow:hidden;
border-radius:12px;
box-shadow:0 8px 22px rgba(0,0,0,0.15);
max-width:1000px;
margin:auto;
}

.carousel-inner{
display:flex;
transition:transform 0.6s ease-in-out;
}

.carousel-item{
min-width:100%;
}

.carousel-inner img{
width:100%;
height:auto;
max-height:550px;
object-fit:cover;
}

.carousel-btn{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.5);
color:white;
border:none;
font-size:2rem;
padding:8px 14px;
border-radius:50%;
cursor:pointer;
z-index:2;
}

.prev{left:10px}
.next{right:10px}

/* MINIATURAS */
.thumbnails{
display:flex;
justify-content:center;
flex-wrap:wrap;
margin-top:20px;
gap:8px;
}

.thumbnails img{
width:100px;
height:60px;
object-fit:cover;
cursor:pointer;
border:2px solid transparent;
border-radius:4px;
}

.thumbnails img:hover{
border:2px solid #d4af37;
}

/* WHATSAPP */
.whatsapp-btn{
position:fixed;
right:20px;
bottom:20px;
background:#25D366;
color:white;
padding:10px 14px;
border-radius:50px;
display:flex;
align-items:center;
gap:8px;
text-decoration:none;
z-index:9999;
}

.whatsapp-btn img{
width:28px;
height:28px;
}

/* FOOTER */
footer{
background:#000;
color:white;
text-align:center;
padding:25px;
margin-top:40px;
}
</style>
</head>

<body>

<!-- HEADER (IGUAL AL INDEX) -->
<header>
<div class="header-inner">

<div class="brand">
<img src="img/logo.png" alt="Logo">
</div>

<nav>
<a href="index.html#inicio">Inicio</a>
<a href="index.html#quienes">Quiénes Somos</a>
<a href="index.html#mision">Misión</a>
<a href="index.html#vision">Visión</a>
<a href="index.html#servicios">Servicios</a>
<a href="galeria.html">Galería</a>
<a href="index.html#contacto">Contáctanos</a>
</nav>

</div>
</header>

<!-- GALERÍA -->
<main>
<section class="gallery-section">

<h2>Galería</h2>

<div class="carousel">
<button class="carousel-btn prev" onclick="moveSlide(-1)">&#10094;</button>

<div class="carousel-inner" id="carouselInner">
<div class="carousel-item"><img src="img/T7.jpeg"></div>
<div class="carousel-item"><img src="img/T8.jpeg"></div>
</div>

<button class="carousel-btn next" onclick="moveSlide(1)">&#10095;</button>
</div>

<div class="thumbnails">
<img src="img/T7.jpeg" onclick="jumpToSlide(0)">
<img src="img/T8.jpeg" onclick="jumpToSlide(1)">
</div>

</section>
</main>

<!-- WHATSAPP -->
<a class="whatsapp-btn" href="https://wa.me/573222800306" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
<span>WhatsApp</span>
</a>

<!-- FOOTER -->
<footer>

  <div class="line1">© 2026 Martha Lucia Chacon - Ingeniera de sistemas | Todos los derechos reservados</div>
  <div class="line2">Calle 11 11 - 34 Barrio Centro Vista Hermosa, Meta | Celular 3106733175</div>

</footer>

<script>
const inner = document.getElementById('carouselInner');
let index = 0;
const total = inner.children.length;

function moveSlide(n){
index = (index + n + total) % total;
inner.style.transform = `translateX(-${index * 100}%)`;
}

function jumpToSlide(n){
index = n;
inner.style.transform = `translateX(-${index * 100}%)`;
}

setInterval(()=>moveSlide(1),4000);
</script>

</body>
</html>
